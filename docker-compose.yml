n ame: municipality-ticketing

services:
  postgres:
    image: postgres:16-alpine
    container_name: municipality-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Your_strong_password123!"
      POSTGRES_DB: MunicipalityTicketing.Default
    ports:
      - "5433:5432"
    networks:
      - municipality-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MunicipalityTicketing.Default"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: municipality-redis
    ports:
      - "6379:6379"
    networks:
      - municipality-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: municipality-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - municipality-net

  identity:
      build:
        context: .
        dockerfile: services/identity/Dockerfile
      container_name: municipality-identity
      environment:
        ASPNETCORE_ENVIRONMENT: Docker
        ASPNETCORE_URLS: http://+:8080
        ASPNETCORE_SERVICE_NAME: identity-service
        App:Version: 1.0.0
        ConnectionStrings:DefaultConnection: Host=postgres;Database=MunicipalityTicketing.Default;Username=postgres;Password=Your_strong_password123!
        ConnectionStrings:Redis: municipality-redis:6379,abortConnect=false,connectTimeout=5000
        Redis:Enabled: true
        Redis:Prefix: muni:
        Redis:ConnectionString: municipality-redis:6379
        OpenTelemetry:Enabled: true
        OpenTelemetry:Traces:Endpoint: http://otel-collector:4317
        OpenTelemetry:Metrics:Enabled: true
        OpenTelemetry:Metrics:Endpoint: http://otel-collector:4317
    ports:
      - "5115:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - municipality-net

  wallet:
      build:
        context: .
        dockerfile: services/wallet/Dockerfile
      container_name: municipality-wallet
      environment:
        ASPNETCORE_ENVIRONMENT: Docker
        ASPNETCORE_URLS: http://+:8080
        ASPNETCORE_SERVICE_NAME: wallet-service
        App:Version: 1.0.0
        ConnectionStrings:DefaultConnection: Host=postgres;Database=MunicipalityTicketing.Default;Username=postgres;Password=Your_strong_password123!
        ConnectionStrings:Redis: municipality-redis:6379,abortConnect=false,connectTimeout=5000
        Redis:Enabled: true
        Redis:Prefix: muni:
        Redis:ConnectionString: municipality-redis:6379
        OpenTelemetry:Enabled: true
        OpenTelemetry:Traces:Endpoint: http://otel-collector:4317
        OpenTelemetry:Metrics:Enabled: true
        OpenTelemetry:Metrics:Endpoint: http://otel-collector:4317
    ports:
      - "5136:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - municipality-net

  telemetry:
      build:
        context: .
        dockerfile: services/telemetry/Dockerfile
      container_name: municipality-telemetry
      environment:
        ASPNETCORE_ENVIRONMENT: Docker
        ASPNETCORE_URLS: http://+:8080
        ASPNETCORE_SERVICE_NAME: telemetry-service
        App:Version: 1.0.0
        ConnectionStrings:DefaultConnection: Host=postgres;Database=MunicipalityTicketing.Default;Username=postgres;Password=Your_strong_password123!
        ConnectionStrings:Redis: municipality-redis:6379,abortConnect=false,connectTimeout=5000
        Redis:Enabled: true
        Redis:Prefix: muni:
        Redis:ConnectionString: municipality-redis:6379
        OpenTelemetry:Enabled: true
        OpenTelemetry:Traces:Endpoint: http://otel-collector:4317
        OpenTelemetry:Metrics:Enabled: true
        OpenTelemetry:Metrics:Endpoint: http://otel-collector:4317
    ports:
      - "5169:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - municipality-net

  event-processor:
      build:
        context: .
        dockerfile: workers/event-processor/Dockerfile
      container_name: municipality-event-processor
      environment:
        DOTNET_ENVIRONMENT: Docker
        ASPNETCORE_SERVICE_NAME: event-processor-worker
        App:Version: 1.0.0
        ConnectionStrings:DefaultConnection: Host=postgres;Database=MunicipalityTicketing.Default;Username=postgres;Password=Your_strong_password123!
        ConnectionStrings:Redis: municipality-redis:6379,abortConnect=false,connectTimeout=5000
        Redis:Enabled: true
        Redis:Prefix: muni:
        Redis:ConnectionString: municipality-redis:6379
        OpenTelemetry:Enabled: true
        OpenTelemetry:Traces:Endpoint: http://otel-collector:4317
        Event:Bus:Host: rabbitmq:5672
        Event:Bus:Username: guest
        Event:Bus:Password: guest
        Event:Bus:VirtualHost: /
        Event:Bus:QueueName: municipality-events
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - municipality-net

  gateway:
      build:
        context: .
        dockerfile: gateway/Dockerfile
      container_name: municipality-gateway
      environment:
        ASPNETCORE_ENVIRONMENT: Docker
        ASPNETCORE_URLS: http://+:8080
        ASPNETCORE_SERVICE_NAME: api-gateway
        App:Version: 1.0.0
        OpenTelemetry:Enabled: true
        OpenTelemetry:Traces:Endpoint: http://otel-collector:4317
        ReverseProxy:Routes:identity-route:ClusterId:identity-cluster
        ReverseProxy:Routes:wallet-route:ClusterId:wallet-cluster
        ReverseProxy:Routes:telemetry-route:ClusterId:telemetry-cluster
    ports:
      - "5197:8080"
    depends_on:
      identity:
        condition: service_started
      wallet:
        condition: service_started
      telemetry:
        condition: service_started
    networks:
      - municipality-net

  simulator:
    build:
      context: .
      dockerfile: tools/simulator/Dockerfile
    container_name: municipality-simulator
    profiles: ["simulation"]
    environment:
      SIMULATOR_BASE_URL: http://gateway:8080
      SIMULATOR_TENANT_ID: bursa
      SIMULATOR_DURATION_SECONDS: "60"
      SIMULATOR_CONCURRENCY: "16"
      SIMULATOR_DELAY_MS: "50"
    depends_on:
      gateway:
        condition: service_started
    networks:
      - municipality-net

networks:
  municipality-net:
    driver: bridge

# OpenTelemetry Collector for distributed tracing
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: municipality-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "8889:8889"  # Prometheus metrics
      - "13133:13133"  # Health check
      - "55679:55679"  # zpages
    depends_on:
      - postgres
    networks:
      - municipality-net

